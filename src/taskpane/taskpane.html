<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outlook Summary Add-in</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fafaf8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: white;
      border-bottom: 1px solid #e8e5e0;
      padding: 12px 16px 0;
      flex-shrink: 0;
    }
    #header .meta {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #header .subject {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 10px;
      min-height: calc(1.3 * 13px * 2);
      word-break: break-word;
      overflow-wrap: break-word;
    }
    #tabs { display: none; }
    .tab-btn {
      display: none;
    }
    .tab-btn.active {
      display: none;
    }

    /* ── Content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .html-content {
      font-size: 13px;
      color: #333;
      line-height: 1.75;
    }
    .html-content ul, .html-content ol { padding-left: 18px; }
    .html-content li { margin-bottom: 6px; }
    .html-content p  { margin-bottom: 8px; }

    /* ── Status bar ── */
    #status {
      font-size: 11px;
      color: #aaa;
      padding: 6px 16px;
      border-top: 1px solid #f0ede8;
      background: white;
      flex-shrink: 0;
      min-height: 26px;
    }
    #status.error  { color: #c50f1f; }
    #status.saving { color: #ca5010; }
    #status.ok     { color: #107c10; }

    /* ── Footer ── */
    #footer {
      font-size: 10px;
      color: #ccc;
      padding: 4px 16px;
      border-top: 1px solid #f0ede8;
      background: white;
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Loading ── */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="header">
    <div class="meta" id="meta"></div>
    <div class="subject" id="subject">&nbsp;</div>
  </div>

  <div id="content">
    <div id="loading"></div>
    <div id="section-summary" class="section" style="display:none">
      <div class="section-title" id="title-summary"></div>
      <div id="pane-summary" class="html-content"></div>
    </div>
    <div id="section-actions" class="section" style="display:none">
      <div class="section-title" id="title-actions"></div>
      <div id="pane-actions" class="html-content"></div>
    </div>
    <div id="section-settings" class="section" style="display:none">
      <div class="section-title" id="title-settings"></div>
      <div id="pane-settings" class="html-content"></div>
    </div>
  </div>

  <div id="status"></div>

  <div id="footer"></div>

  <script>
    // ── i18n ──────────────────────────────────────────────────────────────
    const isSv = navigator.language.toLowerCase().startsWith("sv");

    const t = {
      loading:         isSv ? "Hämtar konversationsdata..."       : "Loading conversation data...",
      recipients:      isSv ? "mottagare"                          : "recipients",
      noSubject:       isSv ? "(inget ämne)"                      : "(no subject)",
      tabActions:      isSv ? "Åtgärder"                         : "Actions",
      tabSummary:      isSv ? "Sammanfattning"                     : "Summary",
      tabSettings:     isSv ? "Inställningar"                      : "Settings",
      loadError:       isSv ? "Kunde inte läsa customProperties: ": "Failed to read customProperties: ",
      conversionError: isSv ? "Markdown-konvertering misslyckades: " : "Markdown conversion failed: ",
    };

    // Apply static i18n strings to DOM
    document.getElementById("loading").textContent     = t.loading;
    document.getElementById("title-actions").textContent = t.tabActions;
    document.getElementById("title-summary").textContent = t.tabSummary;
    document.getElementById("title-settings").textContent = t.tabSettings;
    document.getElementById("meta").textContent        = t.loading;
    document.documentElement.lang = isSv ? "sv" : "en";

    // ── Version (hardcoded) ───────────────────────────────────────────────
    const VERSION = "1.4.9";
    document.getElementById("footer").textContent = `v${VERSION}`;

    // ── State ─────────────────────────────────────────────────────────────
    let currentTab = "vertical";

    // ── Office bootstrap ──────────────────────────────────────────────────
    Office.onReady(() => {
      updateUIForCurrentItem();

      // Register ItemChanged event handler on mailbox for pinned taskpane support
      Office.context.mailbox.addHandlerAsync(
        Office.EventType.ItemChanged,
        onItemChanged
      );
    });

    // ── Update UI for current item ─────────────────────────────────────────
    function updateUIForCurrentItem() {
      const item = Office.context.mailbox.item;
      if (!item) return;

      document.getElementById("meta").textContent =
        (item.from ? item.from.displayName + " - " : "") +
        (item.to   ? item.to.length + " " + t.recipients : "");

      document.getElementById("subject").textContent = item.subject || t.noSubject;

      item.loadCustomPropertiesAsync(onPropsLoaded);
    }

    // ── ItemChanged event handler ──────────────────────────────────────────
    function onItemChanged(event) {
      updateUIForCurrentItem();
    }

    // ── customProperties loaded ───────────────────────────────────────────
    function onPropsLoaded(result) {
      if (result.status !== Office.AsyncResultStatus.Succeeded) {
        setStatus(t.loadError + result.error.message, "error");
        showContent("", "");
        return;
      }

      const props = result.value;
      const summary = props.get("summary") || "";
      const actions = props.get("actions") || "";

      setStatus("", "");
      showContent(summary, actions);
    }

    // ── Render ────────────────────────────────────────────────────────────
    function showContent(summary, actions) {
      document.getElementById("loading").style.display = "none";

      // Step 1: Try to convert markdown to HTML with fallback to raw value on error
      let summaryHTML = summary;
      let actionsHTML = actions;

      if (summary) {
        try {
          summaryHTML = marked.parse(summary);
        } catch (err) {
          setStatus(t.conversionError + err.message, "error");
          summaryHTML = summary; // fallback to raw value
        }
      }

      if (actions) {
        try {
          actionsHTML = marked.parse(actions);
        } catch (err) {
          setStatus(t.conversionError + err.message, "error");
          actionsHTML = actions; // fallback to raw value
        }
      }

      // Step 2: ALWAYS sanitize with DOMPurify (default config preserves all safe HTML)
      summaryHTML = DOMPurify.sanitize(summaryHTML);
      actionsHTML = DOMPurify.sanitize(actionsHTML);

      // Step 3: Render sanitized HTML
      document.getElementById("pane-summary").innerHTML = summaryHTML;
      document.getElementById("pane-actions").innerHTML = actionsHTML;
      if (summary) document.getElementById("section-summary").style.display = "flex";
      if (actions) document.getElementById("section-actions").style.display = "flex";
    }

    function switchTab(tab) {
      // Tab switching no longer used; all content displayed vertically
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className   = type || "";
    }
  </script>
</body>
</html>
