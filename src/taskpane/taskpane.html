<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outlook Summary Add-in</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fafaf8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: white;
      border-bottom: 1px solid #e8e5e0;
      padding: 12px 16px 0;
      flex-shrink: 0;
    }
    #header .meta {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #header .subject {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #tabs { display: none; }
    .tab-btn {
      display: none;
    }
    .tab-btn.active {
      display: none;
    }

    /* ── Content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .html-content {
      font-size: 13px;
      color: #333;
      line-height: 1.75;
    }
    .html-content ul, .html-content ol { padding-left: 18px; }
    .html-content li { margin-bottom: 6px; }
    .html-content p  { margin-bottom: 8px; }

    /* ── Status bar ── */
    #status {
      font-size: 11px;
      color: #aaa;
      padding: 6px 16px;
      border-top: 1px solid #f0ede8;
      background: white;
      flex-shrink: 0;
      min-height: 26px;
    }
    #status.error  { color: #c50f1f; }
    #status.saving { color: #ca5010; }
    #status.ok     { color: #107c10; }

    /* ── Footer ── */
    #footer {
      font-size: 10px;
      color: #ccc;
      padding: 4px 16px;
      border-top: 1px solid #f0ede8;
      background: white;
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Loading ── */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="header">
    <div class="meta" id="meta"></div>
    <div class="subject" id="subject">&nbsp;</div>
  </div>

  <div id="content">
    <div id="loading"></div>
    <div id="section-summary" class="section" style="display:none">
      <div class="section-title" id="title-summary"></div>
      <div id="pane-summary" class="html-content"></div>
    </div>
    <div id="section-actions" class="section" style="display:none">
      <div class="section-title" id="title-actions"></div>
      <div id="pane-actions" class="html-content"></div>
    </div>
    <div id="section-settings" class="section" style="display:none">
      <div class="section-title" id="title-settings"></div>
      <div id="pane-settings" class="html-content"></div>
    </div>
  </div>

  <div id="status"></div>

  <div id="footer"></div>

  <script>
    // ── i18n ──────────────────────────────────────────────────────────────
    const isSv = navigator.language.toLowerCase().startsWith("sv");

    const t = {
      loading:         isSv ? "Hämtar konversationsdata..."       : "Loading conversation data...",
      recipients:      isSv ? "mottagare"                          : "recipients",
      noSubject:       isSv ? "(inget ämne)"                      : "(no subject)",
      tabActions:      isSv ? "Åtgärder"                         : "Actions",
      tabSummary:      isSv ? "Sammanfattning"                     : "Summary",
      tabSettings:     isSv ? "Inställningar"                      : "Settings",
      saving:          isSv ? "Sparar exempeldata..."              : "Saving sample data...",
      saveError:       isSv ? "Sparning misslyckades: "            : "Save failed: ",
      loadError:       isSv ? "Kunde inte läsa customProperties: ": "Failed to read customProperties: ",
      savedOk:         isSv ? "Exempeldata sparad i customProperties"
                              : "Sample data saved to customProperties",
      loadedOk:        isSv ? "Data inläst från customProperties"
                              : "Data loaded from customProperties",
      fallbackSummary: isSv
        ? "<p>Det här är ett exempel på <strong>summary</strong>. Ingen summary hittades i meddelandets customProperties.</p>"
        : "<p>This is a sample <strong>summary</strong>. No summary was found in the message's customProperties.</p>",
      fallbackActions: isSv
        ? "<ul><li>Det här är ett exempel på en <strong>action</strong>. Inga actions hittades i meddelandets customProperties.</li></ul>"
        : "<ul><li>This is a sample <strong>action</strong>. No actions were found in the message's customProperties.</li></ul>",
    };

    // Apply static i18n strings to DOM
    document.getElementById("loading").textContent     = t.loading;
    document.getElementById("title-actions").textContent = t.tabActions;
    document.getElementById("title-summary").textContent = t.tabSummary;
    document.getElementById("title-settings").textContent = t.tabSettings;
    document.getElementById("meta").textContent        = t.loading;
    document.documentElement.lang = isSv ? "sv" : "en";

    // ── Version (hardcoded) ───────────────────────────────────────────────
    const VERSION = "1.4.6";
    document.getElementById("footer").textContent = `v${VERSION}`;

    // ── State ─────────────────────────────────────────────────────────────
    let currentTab = "vertical";

    // ── Office bootstrap ──────────────────────────────────────────────────
    Office.onReady(() => {
      updateUIForCurrentItem();

      // Register ItemChanged event handler on mailbox for pinned taskpane support
      Office.context.mailbox.addHandlerAsync(
        Office.EventType.ItemChanged,
        onItemChanged
      );
    });

    // ── Update UI for current item ─────────────────────────────────────────
    function updateUIForCurrentItem() {
      const item = Office.context.mailbox.item;
      if (!item) return;

      document.getElementById("meta").textContent =
        (item.from ? item.from.displayName + " - " : "") +
        (item.to   ? item.to.length + " " + t.recipients : "");

      document.getElementById("subject").textContent = item.subject || t.noSubject;

      item.loadCustomPropertiesAsync(onPropsLoaded);
    }

    // ── ItemChanged event handler ──────────────────────────────────────────
    function onItemChanged(event) {
      updateUIForCurrentItem();
    }

    // ── customProperties loaded ───────────────────────────────────────────
    function onPropsLoaded(result) {
      if (result.status !== Office.AsyncResultStatus.Succeeded) {
        setStatus(t.loadError + result.error.message, "error");
        showContent("", "");
        return;
      }

      const props = result.value;
      let summary  = props.get("summary");
      let actions  = props.get("actions");
      let needsSave = false;
      let hasExistingData = summary || actions;

      if (!summary) { summary = t.fallbackSummary; props.set("summary", summary); needsSave = true; }
      if (!actions) { actions = t.fallbackActions; props.set("actions", actions); needsSave = true; }

      if (needsSave) {
        setStatus(t.saving, "saving");
        props.saveAsync((saveResult) => {
          if (saveResult.status !== Office.AsyncResultStatus.Succeeded) {
            setStatus(t.saveError + saveResult.error.message, "error");
          } else {
            setStatus(t.savedOk + " (cecp-357113F9-C204-44CA-A3FC-101588AF3F49)", "ok");
          }
          showContent(summary, actions);
        });
      } else {
        if (hasExistingData) {
          setStatus(t.loadedOk + " (cecp-357113F9-C204-44CA-A3FC-101588AF3F49)", "ok");
        } else {
          setStatus("", "");
        }
        showContent(summary, actions);
      }
    }

    // ── Render ────────────────────────────────────────────────────────────
    function showContent(summary, actions) {
      document.getElementById("loading").style.display  = "none";
      document.getElementById("pane-summary").innerHTML = summary;
      document.getElementById("pane-actions").innerHTML = actions;
      document.getElementById("section-summary").style.display = "flex";
      document.getElementById("section-actions").style.display = "flex";
    }

    function switchTab(tab) {
      // Tab switching no longer used; all content displayed vertically
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className   = type || "";
    }
  </script>
</body>
</html>
